services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: authometry
      POSTGRES_PASSWORD: authometry
      POSTGRES_USER: authometry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authometry -d authometry"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - authometry-postgres:/var/lib/postgresql

volumes:
  authometry-postgres:
